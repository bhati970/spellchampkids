<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alphabet Learning</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#6dd5fa,#ffffff);
text-align:center;
}

h1{
color:#0d47a1;
font-size:42px;
}

p{
font-size:20px;
color:#333;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:20px;
max-width:900px;
margin:auto;
margin-top:40px;
}

.card{
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
cursor:pointer;
transition:.3s;
font-size:40px;
font-weight:bold;
}

.card:hover{
transform:scale(1.08);
background:#fff9c4;
}

.back{
display:inline-block;
margin-top:40px;
padding:15px 30px;
background:#1976d2;
color:white;
text-decoration:none;
border-radius:12px;
font-size:20px;
}

</style>

</head>

<body>

<h1>🔤 Learn Alphabet</h1>

<p>Click any letter</p>

<div class="grid">
<div class="card">A</div>
<div class="card">B</div>
<div class="card">C</div>
<div class="card">D</div>
<div class="card">E</div>
<div class="card">F</div>
<div class="card">G</div>
<div class="card">H</div>
<div class="card">I</div>
<div class="card">J</div>
<div class="card">K</div>
<div class="card">L</div>
<div class="card">M</div>
<div class="card">N</div>
<div class="card">O</div>
<div class="card">P</div>
<div class="card">Q</div>
<div class="card">R</div>
<div class="card">S</div>
<div class="card">T</div>
<div class="card">U</div>
<div class="card">V</div>
<div class="card">W</div>
<div class="card">X</div>
<div class="card">Y</div>
<div class="card">Z</div>

</div>

<a class="back" href="../index.html">⬅ Back to Home</a>

</body>
</html>
